<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Golf</title>
    <link rel="stylesheet" href="gravity.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body class="neon-theme">
    <div id="game-container">
        <header class="game-header">
            <a href="index.html" class="game-btn tertiary back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                HUB
            </a>

            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">LEVEL</span>
                    <span class="stat-value" id="level-display">1</span>
                </div>
            </div>

            <div class="controls-container">
                <button id="reset-btn" class="game-btn secondary">Reset Level</button>
                <select id="theme-select" class="theme-select">
                    <option value="neon">Neon Space</option>
                    <option value="minimal">Minimal</option>
                </select>
            </div>
        </header>

        <main class="game-main">
            <canvas id="game-canvas"></canvas>

            <!-- Aiming overlay (drag line) -->
            <canvas id="ui-canvas"></canvas>

            <div id="tutorial-text" class="tutorial-overlay">Drag anywhere to aim and shoot</div>
        </main>

        <!-- Level Complete / Game Complete Modal -->
        <div id="game-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title" class="glitch-text" data-text="LEVEL COMPLETE">LEVEL COMPLETE</h2>
                <div class="modal-stats">
                    <p id="modal-message">Great shot!</p>
                </div>
                <div class="modal-actions">
                    <button id="next-level-btn" class="game-btn primary">Next Level</button>
                    <a href="index.html" id="hub-return-btn" class="game-btn secondary hidden">Return to Hub</a>
                </div>
            </div>
        </div>
    </div>

    <script src="gravity.js"></script>
</body>
</html>
