<!DOCTYPE html>
<html>
<head>
  <title>Benchmark</title>
</head>
<body>
  <div id="score">0</div>
  <div id="high-score">0</div>
  <div id="combo-display"></div>
  <div id="combo-mult">1</div>
  <div id="combo-bar"></div>
  <div id="pause-indicator"></div>
  <div id="canvas-overlay"></div>
  <div id="fps-counter"></div>
  <div id="fps-value"></div>
  <div id="menu-level"></div>
  <div id="menu-high-score"></div>
  <div id="current-difficulty"></div>
  <div id="current-theme"></div>
  <div id="current-mode"></div>
  <div id="sound-icon"></div>
  <div id="final-score"></div>
  <div id="final-high-score"></div>
  <div id="food-eaten"></div>
  <div id="snake-length"></div>
  <div id="best-combo"></div>
  <div id="death-reason"></div>
  <div id="run-xp-summary"></div>
  <div id="new-record-row"></div>
  <!-- Note: We have 500 score-display elements so querySelector takes longer like in a complex DOM -->
  <script>
    const fragment = document.createDocumentFragment();
    for (let i = 0; i < 500; i++) {
      const div = document.createElement('div');
      div.className = 'not-score-display';
      fragment.appendChild(div);
    }
    const scoreDisplay = document.createElement('div');
    scoreDisplay.className = 'score-display';
    fragment.appendChild(scoreDisplay);
    document.body.appendChild(fragment);
  </script>

  <script src="arcade/script.js"></script>
  <script>
    try {
      const ui = new UIManager();
      const state = {
        displayScore: 100,
        highScore: 200,
        combo: 2,
        comboTimer: 50,
        comboWindow: 100,
        nearMissGlow: 0.1,
        almostThere: true,
        justScored: true
      };

      const start = performance.now();
      for (let i = 0; i < 50000; i++) {
        ui.updateHUD(state);
      }
      const end = performance.now();

      const resultDiv = document.createElement('div');
      resultDiv.id = 'result';
      resultDiv.textContent = `Time taken: ${end - start} ms`;
      document.body.appendChild(resultDiv);
      console.log(`Time taken: ${end - start} ms`);
    } catch (e) {
      console.error(e.toString());
      const errorDiv = document.createElement('div');
      errorDiv.id = 'result';
      errorDiv.textContent = 'Error';
      document.body.appendChild(errorDiv);
    }
  </script>
</body>
</html>
