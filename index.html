<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Game Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="hub.css">
</head>
<body>
    <canvas id="hub-bg-canvas"></canvas>
    
    <div class="hub-container">
        <header class="hub-header">
            <h1 class="hub-title">
                <span class="title-neon">NEON</span>
                <span class="title-hub">ARCADE</span>
            </h1>
            <p class="hub-subtitle">Choose Your Experience</p>
        </header>

        <main class="game-grid">
            <a href="snake.html" class="game-card">
                <div class="card-glow neon-blue"></div>
                <div class="card-content">
                    <div class="game-icon snake-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 16C4 16 4 8 12 8C20 8 20 16 20 16" stroke-linecap="round"/>
                            <circle cx="17" cy="12" r="1" fill="currentColor"/>
                        </svg>
                    </div>
                    <h2 class="game-name">NEON SNAKE</h2>
                    <p class="game-desc">Cyberpunk edition of the classic</p>
                </div>
            </a>

            <a href="dragon.html" class="game-card">
                <div class="card-glow neon-green"></div>
                <div class="card-content">
                    <div class="game-icon dragon-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 14l4-4 4 4 8-8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M16 6h4v4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2 class="game-name">FLAPPY DRAGON</h2>
                    <p class="game-desc">Navigate the neon pillars</p>
                </div>
            </a>

            <a href="bubble.html" class="game-card">
                <div class="card-glow neon-pink"></div>
                <div class="card-content">
                    <div class="game-icon bubble-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="8"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                    <h2 class="game-name">NEON BUBBLE</h2>
                    <p class="game-desc">Match and pop to survive</p>
                </div>
            </a>
        </main>
    </div>

    <script src="hub.js"></script>
</body>
</html>
